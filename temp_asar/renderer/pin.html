<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enter PIN</title>
    <style>
      html, body { height: 100%; overflow: hidden; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 20px; max-width: 560px; }
      .row { margin: 10px 0; }
      input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #0002; border-radius: 10px; box-sizing: border-box; }
      .actions { display: flex; gap: 10px; justify-content: flex-end; }
      button { padding: 9px 14px; border-radius: 10px; border: 1px solid #0002; cursor: pointer; }
      #btn-ok { background: #2b73ff; color: #fff; border-color: #2b73ff; }
    </style>
  </head>
  <body>
    <div class="row" id="message">Enter token PIN</div>
    <div class="row"><input type="password" id="pin" autofocus /></div>
    <div class="row actions">
      <button id="btn-cancel">Cancel</button>
      <button id="btn-ok">OK</button>
    </div>
    <script src="pin.js"></script>
  </body>
  </html>
